<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrowserOS Eval Viewer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-brand {
    font-size: 15px;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: -0.01em;
  }
  .header-brand span { color: #58a6ff; }
  .header-sep {
    width: 1px;
    height: 20px;
    background: #30363d;
  }
  .header-run {
    font-size: 13px;
    color: #8b949e;
    font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  .header-date {
    font-size: 12px;
    color: #6e7681;
  }
  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
  }
  .header-stats .stat-total { color: #e6edf3; }
  .header-stats .stat-pass { color: #3fb950; }
  .header-stats .stat-fail { color: #f85149; }
  .header-stats .stat-score { color: #f0883e; }
  .header-report {
    color: #58a6ff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 5px 9px;
    white-space: nowrap;
  }
  .header-report:hover { border-color: #58a6ff; background: #1c2333; }

  /* ── 3-column layout ─────────────────────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left sidebar ────────────────────────────────────────────── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    background: #0d1117;
    flex-shrink: 0;
  }
  .sidebar-stats {
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #8b949e;
  }
  .sidebar-stats .s-pass { color: #3fb950; }
  .sidebar-stats .s-fail { color: #f85149; }
  .sidebar-metrics {
    padding: 12px 16px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric-cell {
    min-width: 0;
  }
  .metric-label {
    display: block;
    font-size: 9px;
    font-weight: 600;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .metric-value {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #e6edf3;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-chart {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mini-chart-title {
    font-size: 10px;
    font-weight: 700;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .mini-bar-row {
    display: grid;
    grid-template-columns: minmax(60px, 1fr) 70px 28px;
    gap: 8px;
    align-items: center;
    font-size: 10px;
    color: #8b949e;
  }
  .mini-bar-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  .mini-bar-track {
    height: 6px;
    background: #21262d;
    border-radius: 999px;
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    background: #58a6ff;
    border-radius: 999px;
  }
  .mini-bar-value {
    color: #e6edf3;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .sidebar-filter {
    padding: 8px 12px;
    border-bottom: 1px solid #21262d;
    background: #161b22;
  }
  .sidebar-filter input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .sidebar-filter input:focus { outline: none; border-color: #58a6ff; }
  .sidebar-filter input::placeholder { color: #484f58; }
  .task-list {
    flex: 1;
    overflow-y: auto;
  }
  .task-item {
    padding: 10px 14px;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.12s;
  }
  .task-item:hover { background: #161b22; }
  .task-item.active {
    background: #1c2333;
    border-left: 3px solid #58a6ff;
    padding-left: 11px;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.pass, .status-dot.completed { background: #3fb950; }
  .status-dot.fail, .status-dot.failed { background: #f85149; }
  .status-dot.timeout { background: #f0883e; }
  .status-dot.pending { background: #484f58; }
  .status-dot.running { background: #d29922; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .task-name {
    font-size: 13px;
    font-weight: 600;
    color: #e6edf3;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .score-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .score-badge.pass { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid rgba(63, 185, 80, 0.3); }
  .score-badge.fail { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }
  .task-query {
    font-size: 11px;
    color: #8b949e;
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .task-meta-line {
    font-size: 10px;
    color: #6e7681;
    margin-top: 3px;
    display: flex;
    gap: 8px;
  }

  /* ── Center: screenshot viewer ───────────────────────────────── */
  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid #30363d;
  }
  .screenshot-controls {
    padding: 10px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .sc-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .sc-btn:hover:not(:disabled) { background: #30363d; border-color: #484f58; }
  .sc-btn:disabled { opacity: 0.3; cursor: default; }
  .sc-btn.playing { background: #58a6ff; border-color: #58a6ff; color: #0d1117; }
  .sc-counter {
    font-size: 13px;
    color: #8b949e;
    min-width: 56px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
  }
  .thumb-strip {
    display: flex;
    gap: 4px;
    margin-left: 8px;
    overflow-x: auto;
    flex: 1;
    padding: 2px 0;
    scrollbar-width: thin;
  }
  .thumb-strip::-webkit-scrollbar { height: 4px; }
  .thumb-strip::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
  .thumb {
    width: 48px;
    height: 32px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    object-fit: cover;
    opacity: 0.45;
    transition: opacity 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .thumb:hover { opacity: 0.75; }
  .thumb.active { border-color: #58a6ff; opacity: 1; }
  .screenshot-display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
    background: #010409;
  }
  .screenshot-display img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid #30363d;
    transition: opacity 0.15s;
  }
  .screenshot-display img.loading { opacity: 0.4; }

  /* ── Right panel: agent stream ───────────────────────────────── */
  .right-panel {
    width: 360px;
    min-width: 360px;
    display: flex;
    flex-direction: column;
    background: #0d1117;
    flex-shrink: 0;
  }
  .stream-header {
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stream-header .msg-count {
    font-weight: 400;
    color: #6e7681;
    text-transform: none;
    letter-spacing: 0;
  }
  .stream-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .stream-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    transition: border-color 0.12s;
  }
  .stream-card:hover { border-color: #484f58; }
  .stream-card .card-label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stream-card .card-label .icon { font-size: 13px; }
  .stream-card.tool-call .card-label { color: #58a6ff; }
  .stream-card.tool-output .card-label { color: #8b949e; }
  .stream-card.tool-error { border-color: rgba(248, 81, 73, 0.4); }
  .stream-card.tool-error .card-label { color: #f85149; }
  .stream-card.reasoning { border-color: rgba(136, 132, 216, 0.3); }
  .stream-card.reasoning .card-label { color: #a78bfa; }
  .stream-card .card-body {
    color: #8b949e;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
  }
  .stream-card .card-body.expandable {
    cursor: pointer;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .stream-card .card-body.expandable::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30px;
    background: linear-gradient(transparent, #161b22);
    pointer-events: none;
  }
  .stream-card .card-body.expandable.expanded {
    max-height: none;
    overflow: visible;
  }
  .stream-card .card-body.expandable.expanded::after { display: none; }
  .stream-card .expand-hint {
    font-size: 10px;
    color: #58a6ff;
    margin-top: 4px;
    cursor: pointer;
  }
  .stream-card .tool-name {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-weight: 700;
    font-size: 12px;
  }

  /* ── Task detail bar (bottom) ────────────────────────────────── */
  .detail-bar {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 12px 24px;
    flex-shrink: 0;
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .detail-bar .db-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .detail-bar .db-section.query-section { flex: 1; min-width: 200px; }
  .detail-bar .db-label {
    font-size: 10px;
    font-weight: 600;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .detail-bar .db-value {
    font-size: 13px;
    color: #e6edf3;
    line-height: 1.5;
  }
  .detail-bar .db-value a {
    color: #58a6ff;
    text-decoration: none;
  }
  .detail-bar .db-value a:hover { text-decoration: underline; }
  .detail-bar .grader-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .grader-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    letter-spacing: 0.01em;
  }
  .grader-pill.pass {
    background: rgba(63, 185, 80, 0.12);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.25);
  }
  .grader-pill.fail {
    background: rgba(248, 81, 73, 0.12);
    color: #f85149;
    border: 1px solid rgba(248, 81, 73, 0.25);
  }
  .grader-pill .pill-score {
    font-weight: 400;
    opacity: 0.8;
  }
  .grader-pill { cursor: pointer; transition: opacity 0.12s; }
  .grader-pill:hover { opacity: 0.8; }
  .grader-reasoning {
    margin-top: 8px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    color: #8b949e;
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
  .grader-reasoning.visible { display: block; }

  /* Performance grader axis breakdown */
  .axes-breakdown { margin-top: 10px; display: none; }
  .axes-breakdown.visible { display: block; }
  .axis-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.1s;
  }
  .axis-row:hover { background: rgba(88, 166, 255, 0.05); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 4px; }
  .axis-row:last-child { border-bottom: none; }
  .axis-name { font-size: 11px; color: #8b949e; width: 120px; flex-shrink: 0; text-transform: capitalize; }
  .axis-bar-bg { flex: 1; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
  .axis-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .axis-score { font-size: 11px; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }
  .axis-reasoning {
    padding: 8px 12px;
    margin: 4px 0 8px 0;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 4px;
    font-size: 11px;
    color: #8b949e;
    line-height: 1.5;
    display: none;
  }
  .axis-reasoning.visible { display: block; }

  /* ── Placeholder / error states ──────────────────────────────── */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #484f58;
    font-size: 14px;
    text-align: center;
    padding: 40px 24px;
    gap: 12px;
  }
  .placeholder .ph-icon { font-size: 40px; opacity: 0.5; }
  .placeholder .ph-text { max-width: 360px; line-height: 1.6; }
  .placeholder.error .ph-icon { color: #f85149; }
  .placeholder.error .ph-text { color: #f85149; }
  .placeholder code {
    background: #161b22;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: #8b949e;
  }

  /* ── Scrollbar ───────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  /* ── Tabs ────────────────────────────────────────────────────── */
  .tabs {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #8b949e;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.12s, border-color 0.12s;
  }
  .tab-btn:hover { color: #e6edf3; }
  .tab-btn.active {
    color: #58a6ff;
    border-bottom-color: #58a6ff;
  }
  .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* ── Overview tab ────────────────────────────────────────────── */
  .overview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    background: #0d1117;
  }
  .overview-section { margin-bottom: 28px; }
  .overview-section h2 {
    font-size: 11px;
    font-weight: 700;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .ov-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .ov-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .ov-card-label {
    font-size: 10px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .ov-card-value {
    font-size: 22px;
    color: #e6edf3;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .ov-card-sub {
    font-size: 11px;
    color: #8b949e;
    margin-top: 4px;
  }
  .ov-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .ov-table th, .ov-table td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid #21262d;
  }
  .ov-table th {
    font-size: 10px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    background: #161b22;
    cursor: pointer;
    user-select: none;
  }
  .ov-table th.sortable:hover { color: #e6edf3; }
  .ov-table th .sort-ind { color: #58a6ff; margin-left: 4px; }
  .ov-table td { color: #e6edf3; font-variant-numeric: tabular-nums; }
  .ov-table tr:hover td { background: #161b22; }
  .ov-rate-bar {
    display: inline-block;
    width: 80px;
    height: 6px;
    background: #21262d;
    border-radius: 999px;
    overflow: hidden;
    vertical-align: middle;
    margin-right: 8px;
  }
  .ov-rate-fill {
    height: 100%;
    background: #3fb950;
    border-radius: 999px;
  }
  .ov-rate-fill.med { background: #f0883e; }
  .ov-rate-fill.low { background: #f85149; }
  .ov-diff-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .ov-matrix {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }
  .ov-matrix-row {
    display: grid;
    grid-template-columns: 110px repeat(3, 1fr);
    gap: 6px;
    align-items: center;
  }
  .ov-matrix-row.header > div {
    font-size: 10px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    text-align: center;
  }
  .ov-matrix-row.header > div:first-child { text-align: left; }
  .ov-matrix-name {
    font-size: 12px;
    color: #e6edf3;
    font-weight: 600;
  }
  .ov-matrix-cell {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #e6edf3;
  }
  .ov-matrix-cell.pass-high { background: rgba(63, 185, 80, 0.15); border-color: rgba(63, 185, 80, 0.35); color: #3fb950; }
  .ov-matrix-cell.pass-mid { background: rgba(240, 136, 62, 0.12); border-color: rgba(240, 136, 62, 0.3); color: #f0883e; }
  .ov-matrix-cell.pass-low { background: rgba(248, 81, 73, 0.12); border-color: rgba(248, 81, 73, 0.3); color: #f85149; }
  .ov-matrix-cell.empty { color: #484f58; background: transparent; border-style: dashed; }
  .ov-tool-bar {
    display: inline-block;
    height: 6px;
    background: #58a6ff;
    border-radius: 999px;
    vertical-align: middle;
    margin-right: 6px;
  }
  .ov-tool-err {
    background: rgba(248, 81, 73, 0.18);
    color: #f85149;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }
  .ov-donut {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .ov-donut-legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: #e6edf3; }
  .ov-donut-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }

  /* ── Tasks tab additions ─────────────────────────────────────── */
  .task-meta-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .task-meta-chip {
    background: rgba(88, 166, 255, 0.1);
    color: #58a6ff;
    border: 1px solid rgba(88, 166, 255, 0.25);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .task-meta-chip.diff-easy { background: rgba(63, 185, 80, 0.12); color: #3fb950; border-color: rgba(63, 185, 80, 0.3); }
  .task-meta-chip.diff-medium { background: rgba(240, 136, 62, 0.12); color: #f0883e; border-color: rgba(240, 136, 62, 0.3); }
  .task-meta-chip.diff-hard { background: rgba(248, 81, 73, 0.12); color: #f85149; border-color: rgba(248, 81, 73, 0.3); }

  .criterion-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 8px;
    max-height: 240px;
    overflow-y: auto;
  }
  .criterion-list.collapsed { display: none; }
  .criterion-toggle {
    cursor: pointer;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .criterion-toggle .chevron {
    display: inline-block;
    transition: transform 0.15s;
    color: #6e7681;
    font-size: 9px;
  }
  .criterion-toggle.open .chevron { transform: rotate(90deg); }
  .criterion-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: #0d1117;
    border: 1px solid #21262d;
  }
  .criterion-row.passed { border-color: rgba(63, 185, 80, 0.25); }
  .criterion-row.failed { border-color: rgba(248, 81, 73, 0.25); background: rgba(248, 81, 73, 0.04); }
  .criterion-mark { width: 14px; text-align: center; font-weight: 700; flex-shrink: 0; }
  .criterion-row.passed .criterion-mark { color: #3fb950; }
  .criterion-row.failed .criterion-mark { color: #f85149; }
  .criterion-body { flex: 1; color: #e6edf3; line-height: 1.45; word-break: break-word; }
  .criterion-detail {
    color: #8b949e;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    margin-top: 4px;
  }
  .criterion-diff {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    margin-top: 4px;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 10px;
  }
  .criterion-diff .k { color: #6e7681; }
  .criterion-diff .v { color: #e6edf3; word-break: break-word; }
  .criterion-soft { display: inline-block; background: rgba(240, 136, 62, 0.18); color: #f0883e; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 6px; }

  .finish-state-panel {
    margin-top: 12px;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #0d1117;
  }
  .finish-state-toggle {
    width: 100%;
    background: transparent;
    border: none;
    color: #8b949e;
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .finish-state-toggle:hover { color: #e6edf3; }
  .finish-state-body {
    display: none;
    padding: 10px 12px;
    border-top: 1px solid #21262d;
    max-height: 320px;
    overflow: auto;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 11px;
    color: #8b949e;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .finish-state-panel.open .finish-state-body { display: block; }

  .stream-controls {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid #21262d;
    background: #0d1117;
    flex-wrap: wrap;
    align-items: center;
  }
  .stream-controls input {
    flex: 1;
    min-width: 120px;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
  }
  .stream-chip {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .stream-chip.active {
    background: #1c2333;
    border-color: #58a6ff;
    color: #58a6ff;
  }
  .stream-card.step-active { box-shadow: 0 0 0 1px #58a6ff; }

  /* ── Report tab ──────────────────────────────────────────────── */
  .report-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: #fff;
  }
  .report-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6e7681;
    font-size: 14px;
    background: #0d1117;
  }

  /* ── Responsive ──────────────────────────────────────────────── */
  @media (max-width: 1200px) {
    .right-panel { width: 300px; min-width: 300px; }
    .sidebar { width: 240px; min-width: 240px; }
  }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-brand">BrowserOS <span>Eval</span></div>
  <div class="header-sep"></div>
  <span class="header-run" id="header-run"></span>
  <span class="header-date" id="header-date"></span>
  <a class="header-report" id="header-report" target="_blank" rel="noopener" style="display: none;">Open Report</a>
  <div class="header-stats" id="header-stats"></div>
</div>

<nav class="tabs" id="tabs">
  <button type="button" class="tab-btn active" data-tab="overview">Overview</button>
  <button type="button" class="tab-btn" data-tab="tasks">Tasks</button>
  <button type="button" class="tab-btn" data-tab="report">Report</button>
</nav>

<!-- Overview tab -->
<div class="tab-content active" id="tab-overview">
  <div class="overview-scroll" id="overview-scroll">
    <div class="placeholder"><div class="ph-text" style="color:#6e7681;">Loading overview...</div></div>
  </div>
</div>

<!-- Tasks tab (the original 3-pane viewer) -->
<div class="tab-content" id="tab-tasks">
  <div class="layout" id="layout">
    <!-- Left sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-stats" id="sidebar-stats"></div>
      <div class="sidebar-metrics" id="sidebar-metrics"></div>
      <div class="sidebar-filter">
        <input type="text" id="filter-input" placeholder="Search tasks..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="task-list" id="task-list"></div>
    </div>

    <!-- Center: screenshot viewer -->
    <div class="center-panel" id="center-panel">
      <div class="placeholder" id="empty-state">
        <div class="ph-icon">&#128270;</div>
        <div class="ph-text">Select a task from the sidebar to view screenshots and agent activity</div>
      </div>
    </div>

    <!-- Right panel: agent stream -->
    <div class="right-panel" id="right-panel" style="display: none;">
      <div class="stream-header">
        Agent Stream
        <span class="msg-count" id="stream-count"></span>
      </div>
      <div class="stream-controls" id="stream-controls" style="display: none;">
        <input type="text" id="stream-search" placeholder="Search messages..." autocomplete="off" spellcheck="false" />
        <button type="button" class="stream-chip active" data-stream-filter="all">All</button>
        <button type="button" class="stream-chip" data-stream-filter="tool">Tools</button>
        <button type="button" class="stream-chip" data-stream-filter="error">Errors</button>
        <button type="button" class="stream-chip" data-stream-filter="reasoning">Reasoning</button>
      </div>
      <div class="stream-body" id="stream-body"></div>
    </div>
  </div>

  <!-- Detail bar (shown when a task is selected) -->
  <div class="detail-bar" id="detail-bar" style="display: none;"></div>
</div>

<!-- Report tab -->
<div class="tab-content" id="tab-report">
  <div class="report-empty" id="report-empty">Loading report...</div>
</div>

<script>
(() => {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const runId = params.get('run');

  if (!runId) {
    showFatalError('Missing <code>?run=</code> parameter in URL.<br>Usage: <code>viewer.html?run=your-run-id</code>');
    return;
  }

  document.getElementById('header-run').textContent = runId;
  document.title = `BrowserOS Eval \u00B7 ${runId}`;

  let manifest = null;
  let selectedTask = null;
  let currentStep = 1;
  let totalSteps = 0;
  let autoplayTimer = null;
  let isPlaying = false;
  let streamFilter = 'all';
  let streamSearch = '';
  const basePath = `runs/${runId}`;

  // ── Fetch manifest ────────────────────────────────────────────
  fetch(`${basePath}/manifest.json`)
    .then((res) => {
      if (!res.ok) throw new Error(`HTTP ${res.status} loading ${basePath}/manifest.json`);
      return res.json();
    })
    .then((data) => {
      manifest = data;
      renderHeader();
      renderSidebar();
      renderOverview();
      setupTabs();
      autoSelectFromHash();
    })
    .catch((err) => {
      showFatalError(`Failed to load manifest<br><code>${esc(err.message)}</code>`);
    });

  // ── Tab switching ─────────────────────────────────────────────
  let activeTab = 'overview';
  let reportLoaded = false;

  function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        showTab(btn.getAttribute('data-tab'));
      });
    });

    // Honor initial hash: #tasks/<queryId> opens Tasks tab; #report opens Report tab
    const hash = window.location.hash.replace('#', '');
    if (hash.startsWith('tasks') || hash.length > 0 && !['overview', 'report'].includes(hash)) {
      showTab('tasks');
    } else if (hash === 'report') {
      showTab('report');
    } else {
      showTab('overview');
    }
  }

  function showTab(name) {
    if (!['overview', 'tasks', 'report'].includes(name)) name = 'overview';
    activeTab = name;
    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.getAttribute('data-tab') === name);
    });
    document.querySelectorAll('.tab-content').forEach((el) => {
      el.classList.toggle('active', el.id === `tab-${name}`);
    });
    if (name === 'report' && !reportLoaded) {
      renderReport();
      reportLoaded = true;
    }
  }

  // ── Header rendering ──────────────────────────────────────────
  function renderHeader() {
    const dateEl = document.getElementById('header-date');
    const dateParts = [];
    if (manifest.uploadedAt) {
      const d = new Date(manifest.uploadedAt);
      dateParts.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        + ' \u00B7 ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }));
    }
    if (manifest.agentConfig) {
      const model = manifest.agentConfig.model || '';
      if (model) dateParts.push(model);
    }
    if (manifest.dataset) {
      dateParts.push(manifest.dataset);
    }
    dateEl.textContent = dateParts.join(' \u00B7 ');

    const tasks = manifest.tasks || [];
    const stats = computeStats(tasks);
    const el = document.getElementById('header-stats');
    const parts = [];
    parts.push(`<span class="stat-total">${stats.total} tasks</span>`);
    parts.push(`<span class="stat-pass">${stats.passed} passed</span>`);
    parts.push(`<span class="stat-fail">${stats.failed} failed</span>`);
    if (stats.avgScore !== null) {
      parts.push(`<span class="stat-score">avg ${stats.avgScore}%</span>`);
    }
    if (stats.avgDurationMs !== null) {
      parts.push(`<span>${fmtDuration(stats.avgDurationMs)} avg</span>`);
    }
    if (stats.avgToolCalls !== null) {
      parts.push(`<span>${fmtCompact(stats.avgToolCalls)} tools/task</span>`);
    }
    el.innerHTML = parts.join('');

    const reportLink = document.getElementById('header-report');
    const url = reportUrl(manifest);
    if (url) {
      reportLink.href = url;
      reportLink.style.display = '';
    } else {
      reportLink.removeAttribute('href');
      reportLink.style.display = 'none';
    }
  }

  // ── Sidebar rendering ─────────────────────────────────────────
  function renderSidebar() {
    const tasks = manifest.tasks || [];
    const stats = computeStats(tasks);

    const statsEl = document.getElementById('sidebar-stats');
    statsEl.innerHTML =
      '<span>' + stats.total + ' total</span>' +
      '<span class="s-pass">' + stats.passed + ' pass</span>' +
      '<span class="s-fail">' + stats.failed + ' fail</span>' +
      (stats.avgSteps !== null ? `<span>${fmtCompact(stats.avgSteps)} steps/task</span>` : '') +
      (stats.avgToolCalls !== null ? `<span>${fmtCompact(stats.avgToolCalls)} tools/task</span>` : '');

    renderSidebarMetrics(tasks, stats);

    renderTaskList('');
  }

  function renderSidebarMetrics(tasks, stats) {
    const el = document.getElementById('sidebar-metrics');
    if (!el) return;

    const chartTasks = tasks
      .slice()
      .sort((a, b) => taskMetrics(b).toolCalls - taskMetrics(a).toolCalls)
      .slice(0, 5);
    const maxCalls = Math.max(1, ...chartTasks.map((task) => taskMetrics(task).toolCalls));

    const bars = chartTasks.map((task) => {
      const calls = taskMetrics(task).toolCalls;
      const width = Math.max(4, Math.round((calls / maxCalls) * 100));
      return (
        '<div class="mini-bar-row">' +
          '<span class="mini-bar-name" title="' + escAttr(task.queryId || task.id || 'Untitled') + '">' + esc(task.queryId || task.id || 'Untitled') + '</span>' +
          '<span class="mini-bar-track"><span class="mini-bar-fill" style="width: ' + width + '%"></span></span>' +
          '<span class="mini-bar-value">' + fmtCompact(calls) + '</span>' +
        '</div>'
      );
    }).join('');

    el.innerHTML =
      '<div class="metric-grid">' +
        '<div class="metric-cell"><span class="metric-label">Avg Time</span><span class="metric-value">' + (stats.avgDurationMs !== null ? fmtDuration(stats.avgDurationMs) : '-') + '</span></div>' +
        '<div class="metric-cell"><span class="metric-label">Avg Steps</span><span class="metric-value">' + (stats.avgSteps !== null ? fmtCompact(stats.avgSteps) : '-') + '</span></div>' +
        '<div class="metric-cell"><span class="metric-label">Avg Tools</span><span class="metric-value">' + (stats.avgToolCalls !== null ? fmtCompact(stats.avgToolCalls) : '-') + '</span></div>' +
      '</div>' +
      '<div class="mini-chart">' +
        '<div class="mini-chart-title">Tool Calls by Task</div>' +
        (bars || '<div class="task-meta-line"><span>No tool calls recorded</span></div>') +
      '</div>';
  }

  function renderTaskList(filter) {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    const tasks = manifest.tasks || [];
    const fl = (filter || '').toLowerCase();

    tasks.forEach((task) => {
      if (fl) {
        const searchText = (`${task.queryId || ''} ${task.query || ''}`).toLowerCase();
        if (searchText.indexOf(fl) === -1) return;
      }

      const item = document.createElement('div');
      item.className = `task-item${selectedTask && selectedTask.queryId === task.queryId ? ' active' : ''}`;

      const statusClass = resolveStatus(task);
      const gradeInfo = resolveGrade(task);

      let badgeHtml = '';
      if (gradeInfo.label) {
        badgeHtml = `<span class="score-badge ${gradeInfo.cls}">${gradeInfo.label}</span>`;
      }

      const metaParts = [];
      const metrics = taskMetrics(task);
      if (metrics.durationMs) metaParts.push(fmtDuration(metrics.durationMs));
      if (metrics.steps) metaParts.push(`${fmtCompact(metrics.steps)} steps`);
      if (metrics.toolCalls) metaParts.push(`${fmtCompact(metrics.toolCalls)} tools`);
      if (metrics.toolErrors) metaParts.push(`${fmtCompact(metrics.toolErrors)} errors`);

      item.innerHTML =
        '<div class="task-row">' +
          '<span class="status-dot ' + statusClass + '"></span>' +
          '<span class="task-name">' + esc(task.queryId || task.id || 'Untitled') + '</span>' +
          badgeHtml +
        '</div>' +
        '<div class="task-query">' + esc(task.query || '') + '</div>' +
        (metaParts.length ? `<div class="task-meta-line">${metaParts.map((p) => `<span>${p}</span>`).join('')}</div>` : '');

      item.addEventListener('click', () => { selectTask(task); });
      list.appendChild(item);
    });
  }

  // ── Overview tab ─────────────────────────────────────────────
  function renderOverview() {
    const root = document.getElementById('overview-scroll');
    const tasks = manifest.tasks || [];
    if (tasks.length === 0) {
      root.innerHTML = '<div class="placeholder"><div class="ph-text" style="color:#6e7681;">No tasks in this run.</div></div>';
      return;
    }

    const stats = computeStats(tasks);
    const runMetrics = manifest.metrics || {};
    const passPct = stats.total > 0 ? Math.round((stats.passed / stats.total) * 100) : 0;

    // Headline cards
    const tokens = runMetrics.tokenUsage;
    const avgInputOut = tokens?.avg
      ? Math.round(tokens.avg.input_tokens + tokens.avg.output_tokens)
      : null;
    const totalInputOut = tokens?.total
      ? Math.round(tokens.total.input_tokens + tokens.total.output_tokens)
      : null;

    const cardsHtml =
      '<div class="ov-cards">' +
        ovCard('Pass rate', `${passPct}%`, `${stats.passed} / ${stats.total}`) +
        ovCard('Avg duration', stats.avgDurationMs !== null ? fmtDuration(stats.avgDurationMs) : '–', `${stats.total} tasks`) +
        ovCard('Avg tools / task', stats.avgToolCalls !== null ? fmtCompact(stats.avgToolCalls) : '–', stats.totalToolErrors > 0 ? `${stats.totalToolErrors} errors total` : '') +
        ovCard('Avg tokens / task', avgInputOut !== null ? fmtTokens(avgInputOut) : '–', totalInputOut !== null ? `${fmtTokens(totalInputOut)} total` : 'not captured') +
      '</div>';

    const websiteHtml = renderWebsiteSection(tasks);
    const difficultyHtml = renderDifficultySection(tasks);
    const matrixHtml = renderWebsiteDifficultyMatrix(tasks);
    const toolHtml = renderToolUsageSection(runMetrics);
    const tokenHtml = renderTokenSection(runMetrics, tasks);
    const terminationHtml = renderTerminationSection(tasks);

    root.innerHTML = cardsHtml + websiteHtml + difficultyHtml + matrixHtml + toolHtml + tokenHtml + terminationHtml;

    // Wire website-row click → switch to tasks tab and filter
    root.querySelectorAll('[data-website-jump]').forEach((row) => {
      row.style.cursor = 'pointer';
      row.addEventListener('click', () => {
        const website = row.getAttribute('data-website-jump');
        showTab('tasks');
        const input = document.getElementById('filter-input');
        if (input) {
          input.value = website;
          renderTaskList(website);
        }
      });
    });
  }

  function ovCard(label, value, sub) {
    return (
      '<div class="ov-card">' +
        `<div class="ov-card-label">${esc(label)}</div>` +
        `<div class="ov-card-value">${esc(value)}</div>` +
        (sub ? `<div class="ov-card-sub">${esc(sub)}</div>` : '') +
      '</div>'
    );
  }

  function renderWebsiteSection(tasks) {
    const groups = groupBy(tasks, (t) => (t.taskMetadata?.website) || 'unknown');
    const rows = Object.entries(groups)
      .map(([website, list]) => {
        const passed = list.filter((t) => resolveStatus(t) === 'pass').length;
        const total = list.length;
        const rate = total > 0 ? passed / total : 0;
        return { website, total, passed, failed: total - passed, rate };
      })
      .sort((a, b) => b.rate - a.rate || b.total - a.total);

    if (rows.length === 1 && rows[0].website === 'unknown') return '';

    const tbody = rows.map((r) => {
      const pct = Math.round(r.rate * 100);
      const cls = r.rate >= 0.7 ? '' : r.rate >= 0.4 ? 'med' : 'low';
      return (
        `<tr data-website-jump="${escAttr(r.website)}">` +
          `<td>${esc(r.website)}</td>` +
          `<td>${r.total}</td>` +
          `<td><span style="color:#3fb950;">${r.passed}</span></td>` +
          `<td><span style="color:${r.failed > 0 ? '#f85149' : '#6e7681'};">${r.failed}</span></td>` +
          `<td><span class="ov-rate-bar"><span class="ov-rate-fill ${cls}" style="width:${pct}%"></span></span><span style="color:#8b949e;">${pct}%</span></td>` +
        '</tr>'
      );
    }).join('');

    return (
      '<div class="overview-section">' +
        '<h2>Pass rate by website</h2>' +
        '<table class="ov-table">' +
          '<thead><tr><th>Website</th><th>Tasks</th><th>Passed</th><th>Failed</th><th>Pass rate</th></tr></thead>' +
          `<tbody>${tbody}</tbody>` +
        '</table>' +
      '</div>'
    );
  }

  function renderDifficultySection(tasks) {
    const buckets = ['easy', 'medium', 'hard'];
    const groups = {};
    let hasAny = false;
    for (const t of tasks) {
      const d = (t.taskMetadata?.difficulty) ? String(t.taskMetadata.difficulty).toLowerCase() : null;
      if (!d) continue;
      hasAny = true;
      if (!groups[d]) groups[d] = [];
      groups[d].push(t);
    }
    if (!hasAny) return '';

    const orderedKeys = [...buckets.filter((k) => groups[k]), ...Object.keys(groups).filter((k) => !buckets.includes(k))];
    const cardsHtml = orderedKeys.map((d) => {
      const list = groups[d];
      const passed = list.filter((t) => resolveStatus(t) === 'pass').length;
      const total = list.length;
      const pct = total > 0 ? Math.round((passed / total) * 100) : 0;
      return ovCard(d, `${pct}%`, `${passed} / ${total} passed`);
    }).join('');

    return (
      '<div class="overview-section">' +
        '<h2>Pass rate by difficulty</h2>' +
        `<div class="ov-diff-cards">${cardsHtml}</div>` +
      '</div>'
    );
  }

  function renderWebsiteDifficultyMatrix(tasks) {
    const buckets = ['easy', 'medium', 'hard'];
    const websites = Array.from(new Set(
      tasks
        .map((t) => t.taskMetadata?.website)
        .filter(Boolean)
    )).sort();
    if (websites.length === 0) return '';

    const header = (
      '<div class="ov-matrix-row header">' +
        '<div>Website</div>' +
        buckets.map((b) => `<div>${esc(b)}</div>`).join('') +
      '</div>'
    );

    const rows = websites.map((site) => {
      const cells = buckets.map((b) => {
        const list = tasks.filter((t) =>
          (t.taskMetadata?.website) === site &&
          ((t.taskMetadata && String(t.taskMetadata.difficulty || '').toLowerCase()) === b)
        );
        if (list.length === 0) return '<div class="ov-matrix-cell empty">—</div>';
        const passed = list.filter((t) => resolveStatus(t) === 'pass').length;
        const rate = passed / list.length;
        const cls = rate >= 0.7 ? 'pass-high' : rate >= 0.4 ? 'pass-mid' : 'pass-low';
        return `<div class="ov-matrix-cell ${cls}">${passed}/${list.length}</div>`;
      }).join('');
      return (
        '<div class="ov-matrix-row">' +
          `<div class="ov-matrix-name">${esc(site)}</div>` +
          cells +
        '</div>'
      );
    }).join('');

    return (
      '<div class="overview-section">' +
        '<h2>Website &times; difficulty</h2>' +
        `<div class="ov-matrix">${header}${rows}</div>` +
      '</div>'
    );
  }

  function renderToolUsageSection(runMetrics) {
    const perTool = runMetrics.perTool || {};
    const entries = Object.entries(perTool)
      .map(([name, stats]) => ({ name, ...stats }))
      .sort((a, b) => b.calls - a.calls)
      .slice(0, 20);
    if (entries.length === 0) return '';

    const maxCalls = Math.max(...entries.map((e) => e.calls), 1);
    const tbody = entries.map((e) => {
      const errPct = e.calls > 0 ? (e.errors / e.calls) * 100 : 0;
      const errCellHtml = e.errors > 0
        ? `<span class="ov-tool-err">${e.errors}</span> <span style="color:#6e7681;">(${errPct.toFixed(1)}%)</span>`
        : '<span style="color:#6e7681;">0</span>';
      const barWidth = Math.max(2, Math.round((e.calls / maxCalls) * 100));
      return (
        '<tr>' +
          `<td><span style="font-family:'SF Mono',monospace;color:#e6edf3;">${esc(e.name)}</span></td>` +
          `<td><span class="ov-tool-bar" style="width:${barWidth}px"></span>${e.calls}</td>` +
          `<td>${fmtCompact(e.avgCalls || 0)}</td>` +
          `<td>${errCellHtml}</td>` +
        '</tr>'
      );
    }).join('');

    return (
      '<div class="overview-section">' +
        '<h2>Tool usage</h2>' +
        '<table class="ov-table">' +
          '<thead><tr><th>Tool</th><th>Total calls</th><th>Avg / task</th><th>Errors</th></tr></thead>' +
          `<tbody>${tbody}</tbody>` +
        '</table>' +
      '</div>'
    );
  }

  function renderTokenSection(runMetrics, tasks) {
    const tokens = runMetrics.tokenUsage;
    if (!tokens || !tokens.total) {
      return (
        '<div class="overview-section">' +
          '<h2>Token usage</h2>' +
          '<div class="ov-card-sub" style="font-size:12px;">No token data captured for this run.</div>' +
        '</div>'
      );
    }
    const total = tokens.total;
    const avg = tokens.avg || total;
    const totalAll = total.input_tokens + total.output_tokens;

    // Find the task that consumed the most input+output tokens
    let maxTask = null;
    let maxTotal = 0;
    for (const t of tasks) {
      const u = t.metrics?.tokenUsage;
      if (!u) continue;
      const sum = (u.input_tokens || 0) + (u.output_tokens || 0);
      if (sum > maxTotal) { maxTotal = sum; maxTask = t; }
    }

    const cards =
      '<div class="ov-cards">' +
        ovCard('Avg input + output', fmtTokens(Math.round(avg.input_tokens + avg.output_tokens)), `input ${fmtTokens(Math.round(avg.input_tokens))} · output ${fmtTokens(Math.round(avg.output_tokens))}`) +
        ovCard('Total input + output', fmtTokens(totalAll), `${fmtTokens(total.input_tokens)} in · ${fmtTokens(total.output_tokens)} out`) +
        ovCard('Cache reads', fmtTokens(total.cache_read_tokens), total.cache_creation_tokens > 0 ? `${fmtTokens(total.cache_creation_tokens)} created` : '') +
        ovCard('Max task', maxTask ? fmtTokens(maxTotal) : '–', maxTask ? maxTask.queryId : '') +
      '</div>';

    return (
      '<div class="overview-section">' +
        '<h2>Token usage</h2>' +
        cards +
      '</div>'
    );
  }

  function renderTerminationSection(tasks) {
    const groups = groupBy(
      tasks,
      (t) => (t.metrics?.terminationReason) || t.status || 'unknown',
    );
    const legend = Object.entries(groups)
      .sort((a, b) => b[1].length - a[1].length)
      .map(([reason, list]) => {
        const color = terminationColor(reason);
        return (
          `<div><span class="dot" style="background:${color}"></span>` +
          `<span style="color:#e6edf3;">${esc(reason)}</span>` +
          `<span style="color:#6e7681; margin-left:8px;">${list.length}</span></div>`
        );
      }).join('');

    return (
      '<div class="overview-section">' +
        '<h2>Termination reasons</h2>' +
        `<div class="ov-donut-legend">${legend}</div>` +
      '</div>'
    );
  }

  function terminationColor(reason) {
    switch (reason) {
      case 'completed': return '#3fb950';
      case 'max_steps': return '#f0883e';
      case 'timeout': return '#d29922';
      case 'error': return '#f85149';
      case 'pass': return '#3fb950';
      case 'fail':
      case 'failed': return '#f85149';
      default: return '#8b949e';
    }
  }

  function groupBy(items, keyFn) {
    const out = {};
    for (const item of items) {
      const key = keyFn(item);
      if (!key) continue;
      if (!out[key]) out[key] = [];
      out[key].push(item);
    }
    return out;
  }

  function fmtTokens(n) {
    const num = Number(n);
    if (!Number.isFinite(num) || num === 0) return '0';
    if (num < 1000) return String(Math.round(num));
    if (num < 1000000) return `${(num / 1000).toFixed(num >= 10000 ? 0 : 1)}k`;
    return `${(num / 1000000).toFixed(num >= 10000000 ? 0 : 1)}M`;
  }

  // ── Report tab ────────────────────────────────────────────────
  function renderReport() {
    const container = document.getElementById('tab-report');
    const url = reportUrl(manifest);
    if (!url) {
      container.innerHTML = '<div class="report-empty">No report.html was generated for this run.</div>';
      return;
    }
    container.innerHTML = `<iframe class="report-frame" src="${escAttr(url)}" title="Run report" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>`;
  }

  // Test harness note: these ASCII section markers are used by r2-viewer-compat.test.ts.
  // -- Artifact path resolution
  function taskKey(task) {
    return task.queryId || task.id || 'unknown-task';
  }

  function legacyArtifactPath(task, artifact) {
    const id = taskKey(task);
    switch (artifact) {
      case 'attempt':
        return `${id}/attempt.json`;
      case 'metadata':
        return `${id}/metadata.json`;
      case 'messages':
        return `${id}/messages.jsonl`;
      case 'trace':
        return `${id}/trace.jsonl`;
      case 'grades':
        return `${id}/grades.json`;
      case 'screenshots':
        return `${id}/screenshots`;
      case 'graderArtifacts':
        return `${id}/grader-artifacts`;
      default:
        return `${id}/${artifact}`;
    }
  }

  function artifactPath(task, artifact) {
    const manifestPath = task.paths?.[artifact];
    if (typeof manifestPath === 'string' && manifestPath.length > 0) {
      return manifestPath.replace(/^\/+/, '');
    }
    return legacyArtifactPath(task, artifact);
  }

  function artifactUrl(task, artifact) {
    return `${basePath}/${artifactPath(task, artifact)}`;
  }

  function runArtifactUrl(path) {
    if (typeof path !== 'string' || path.length === 0) return null;
    return `${basePath}/${path.replace(/^\/+/, '')}`;
  }

  function reportUrl(manifest, task) {
    const url = runArtifactUrl(manifest?.reportPath);
    if (!url || !task) return url;
    return `${url}#${encodeURIComponent(task.queryId || task.id || '')}`;
  }

  function metadataUrl(task) {
    return artifactUrl(task, 'metadata');
  }

  function messagesUrl(task) {
    return artifactUrl(task, 'messages');
  }

  function screenshotUrl(task, n) {
    return `${artifactUrl(task, 'screenshots')}/${n}.png`;
  }

  // -- Task selection
  // ── Task selection ─────────────────────────────────────────────
  function selectTask(task) {
    stopAutoplay();
    selectedTask = task;
    currentStep = 1;
    totalSteps = task.screenshotCount || 0;

    // Update URL hash for deep linking
    history.replaceState(null, '', `?run=${runId}#${task.queryId}`);

    if (activeTab !== 'tasks') showTab('tasks');

    // Re-render sidebar to update active state
    const filterVal = document.getElementById('filter-input').value;
    renderTaskList(filterVal);

    renderCenterPanel(task);
    renderDetailBar(task);
    loadAgentStream(task);
    loadTaskMetadata(task);

    document.getElementById('right-panel').style.display = '';
    document.getElementById('stream-controls').style.display = '';
    document.getElementById('detail-bar').style.display = '';
  }

  function autoSelectFromHash() {
    const hash = window.location.hash.replace('#', '');
    if (hash && manifest?.tasks) {
      const task = manifest.tasks.find((t) => t.queryId === hash);
      if (task) { selectTask(task); return; }
    }
  }

  // -- Center panel
  // ── Center panel: screenshot viewer ────────────────────────────
  function renderCenterPanel(task) {
    const panel = document.getElementById('center-panel');
    const count = task.screenshotCount || 0;

    if (count === 0) {
      panel.innerHTML =
        '<div class="placeholder">' +
          '<div class="ph-icon">&#128247;</div>' +
          '<div class="ph-text">No screenshots available for this task</div>' +
        '</div>';
      return;
    }

    let thumbsHtml = '';
    for (let i = 1; i <= count; i++) {
      const src = screenshotUrl(task, i);
      thumbsHtml += `<img class="thumb${i === 1 ? ' active' : ''}" src="${src}" data-idx="${i}" alt="Step ${i}" loading="lazy" />`;
    }

    panel.innerHTML =
      '<div class="screenshot-controls">' +
        '<button class="sc-btn" id="btn-prev" title="Previous (Left Arrow)">&#9664;</button>' +
        '<span class="sc-counter" id="sc-counter">1 / ' + count + '</span>' +
        '<button class="sc-btn" id="btn-next" title="Next (Right Arrow)">&#9654;</button>' +
        '<button class="sc-btn" id="btn-play" title="Autoplay (Space)">&#9654;</button>' +
        '<div class="thumb-strip" id="thumb-strip">' + thumbsHtml + '</div>' +
      '</div>' +
      '<div class="screenshot-display" id="screenshot-display">' +
        '<img id="main-screenshot" src="' + screenshotUrl(task, 1) + '" alt="Step 1 screenshot" />' +
      '</div>';

    // Wire up controls
    document.getElementById('btn-prev').addEventListener('click', () => { goToStep(currentStep - 1); });
    document.getElementById('btn-next').addEventListener('click', () => { goToStep(currentStep + 1); });
    document.getElementById('btn-play').addEventListener('click', toggleAutoplay);

    const thumbs = document.querySelectorAll('#thumb-strip .thumb');
    thumbs.forEach((th) => {
      th.addEventListener('click', () => {
        goToStep(parseInt(th.getAttribute('data-idx'), 10));
      });
    });

    updateControls();
  }

  function goToStep(n) {
    if (!selectedTask || n < 1 || n > totalSteps) return;
    currentStep = n;

    const img = document.getElementById('main-screenshot');
    if (img) {
      img.classList.add('loading');
      img.src = screenshotUrl(selectedTask, n);
      img.onload = () => { img.classList.remove('loading'); };
      img.onerror = () => { img.classList.remove('loading'); };
      img.alt = `Step ${n} screenshot`;
    }

    updateControls();
    syncStreamToStep(n);
  }

  function updateControls() {
    const prev = document.getElementById('btn-prev');
    const next = document.getElementById('btn-next');
    const counter = document.getElementById('sc-counter');

    if (prev) prev.disabled = currentStep <= 1;
    if (next) next.disabled = currentStep >= totalSteps;
    if (counter) counter.textContent = `${currentStep} / ${totalSteps}`;

    // Thumbnails
    const thumbs = document.querySelectorAll('#thumb-strip .thumb');
    thumbs.forEach((th) => {
      const idx = parseInt(th.getAttribute('data-idx'), 10);
      th.classList.toggle('active', idx === currentStep);
    });

    const active = document.querySelector('#thumb-strip .thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function toggleAutoplay() {
    if (isPlaying) {
      stopAutoplay();
    } else {
      startAutoplay();
    }
  }

  function startAutoplay() {
    if (!selectedTask || totalSteps <= 1) return;
    isPlaying = true;
    const btn = document.getElementById('btn-play');
    if (btn) { btn.innerHTML = '&#9724;'; btn.classList.add('playing'); btn.title = 'Pause (Space)'; }

    if (currentStep >= totalSteps) currentStep = 0;

    autoplayTimer = setInterval(() => {
      if (currentStep >= totalSteps) {
        stopAutoplay();
        return;
      }
      goToStep(currentStep + 1);
    }, 1000);
  }

  function stopAutoplay() {
    isPlaying = false;
    if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
    const btn = document.getElementById('btn-play');
    if (btn) { btn.innerHTML = '&#9654;'; btn.classList.remove('playing'); btn.title = 'Autoplay (Space)'; }
  }

  // ── Detail bar (bottom) ────────────────────────────────────────
  function renderDetailBar(task) {
    const bar = document.getElementById('detail-bar');
    let html = '';

    // Query + metadata chips
    html += '<div class="db-section query-section">';
    html += '<span class="db-label">Query</span>';
    html += `<span class="db-value">${esc(task.query || 'No query')}</span>`;
    const meta = task.taskMetadata || {};
    const chips = [];
    if (meta.website) chips.push(`<span class="task-meta-chip">${esc(meta.website)}</span>`);
    if (meta.difficulty) {
      const cls = `task-meta-chip diff-${String(meta.difficulty).toLowerCase()}`;
      chips.push(`<span class="${cls}">${esc(meta.difficulty)}</span>`);
    }
    if (meta.challenge_type) chips.push(`<span class="task-meta-chip">${esc(meta.challenge_type)}</span>`);
    if (meta.similar_to) chips.push(`<span class="task-meta-chip">similar to ${esc(meta.similar_to)}</span>`);
    if (chips.length > 0) html += `<div class="task-meta-chips">${chips.join('')}</div>`;
    html += '</div>';

    // Start URL
    if (task.startUrl) {
      html += '<div class="db-section">';
      html += '<span class="db-label">Start URL</span>';
      html += `<span class="db-value"><a href="${escAttr(task.startUrl)}" target="_blank" rel="noopener">${esc(truncate(task.startUrl, 60))}</a></span>`;
      html += '</div>';
    }

    // Duration
    const metrics = taskMetrics(task);
    if (metrics.durationMs) {
      html += '<div class="db-section">';
      html += '<span class="db-label">Duration</span>';
      html += `<span class="db-value">${fmtDuration(metrics.durationMs)}</span>`;
      html += '</div>';
    }

    if (metrics.steps) {
      html += '<div class="db-section">';
      html += '<span class="db-label">Steps</span>';
      html += `<span class="db-value">${fmtCompact(metrics.steps)}</span>`;
      html += '</div>';
    }

    html += '<div class="db-section">';
    html += '<span class="db-label">Tool Calls</span>';
    html += `<span class="db-value">${fmtCompact(metrics.toolCalls)}</span>`;
    html += '</div>';

    if (metrics.toolErrors) {
      html += '<div class="db-section">';
      html += '<span class="db-label">Tool Errors</span>';
      html += `<span class="db-value">${fmtCompact(metrics.toolErrors)}</span>`;
      html += '</div>';
    }

    // Token badge
    const tokenUsage = task.metrics?.tokenUsage;
    if (tokenUsage) {
      const inOut = (tokenUsage.input_tokens || 0) + (tokenUsage.output_tokens || 0);
      html += '<div class="db-section">';
      html += '<span class="db-label">Tokens</span>';
      html += `<span class="db-value" title="${tokenUsage.input_tokens} in · ${tokenUsage.output_tokens} out · ${tokenUsage.cache_read_tokens} cached">${fmtTokens(inOut)}</span>`;
      html += '</div>';
    }

    const reportLink = reportUrl(manifest, task);
    if (reportLink) {
      html += '<div class="db-section">';
      html += '<span class="db-label">Report</span>';
      html += `<span class="db-value"><a href="${escAttr(reportLink)}" target="_blank" rel="noopener">Open task analysis</a></span>`;
      html += '</div>';
    }

    // Grader results
    const graders = task.graderResults || {};
    const gKeys = Object.keys(graders);
    if (gKeys.length > 0) {
      html += '<div class="db-section" style="flex-basis: 100%;">';
      html += '<span class="db-label">Graders <span style="font-weight:400;text-transform:none;letter-spacing:0;">(click for reasoning)</span></span>';
      html += '<div class="grader-badges">';
      gKeys.forEach((key, idx) => {
        const g = graders[key];
        const cls = g.pass ? 'pass' : 'fail';
        const label = g.pass ? 'PASS' : 'FAIL';
        let scoreText = '';
        if (typeof g.score === 'number') {
          scoreText = ` <span class="pill-score">${Math.round(g.score * 100)}%</span>`;
        }
        html += `<span class="grader-pill ${cls}" data-grader-idx="${idx}">${esc(key)}: ${label}${scoreText}</span>`;
      });
      html += '</div>';
      html += '<div class="grader-reasoning" id="grader-reasoning"></div>';
      html += '<div class="axes-breakdown" id="axes-breakdown"></div>';
      html += '</div>';
    }

    // Per-criterion checklist (AGI SDK) — collapsible, defaults to collapsed
    if (Array.isArray(task.perCriterion) && task.perCriterion.length > 0) {
      const passed = task.perCriterion.filter((c) => c.passed).length;
      const softened = task.perCriterion.filter((c) => c.softened).length;
      const failed = task.perCriterion.length - passed;
      html += '<div class="db-section" style="flex-basis: 100%;">';
      html += '<span class="db-label criterion-toggle" id="criterion-toggle">';
      html += '<span class="chevron">&#9656;</span>';
      html += 'Criteria';
      html += ` <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#8b949e;">${passed} / ${task.perCriterion.length} passed`;
      if (failed > 0) html += ` · <span style="color:#f85149;">${failed} failed</span>`;
      if (softened > 0) html += ` · ${softened} soft`;
      html += '</span></span>';
      html += '<div class="criterion-list collapsed" id="criterion-list">';
      task.perCriterion.forEach((c) => {
        const cls = c.passed ? 'passed' : 'failed';
        const mark = c.passed ? '✓' : '✗';
        const detail = renderCriterionDetail(c);
        const softTag = c.softened ? '<span class="criterion-soft">SOFT</span>' : '';
        html += `<div class="criterion-row ${cls}">`;
        html += `<div class="criterion-mark">${mark}</div>`;
        html += `<div class="criterion-body">${detail.summary}${softTag}${detail.body}</div>`;
        html += '</div>';
      });
      html += '</div>';
      html += '</div>';
    }

    // Finish-state inspector
    const finishPath = task.paths?.finishState;
    if (finishPath) {
      html += '<div class="db-section" style="flex-basis: 100%;">';
      html += `<div class="finish-state-panel" id="finish-state-panel">`;
      html += `<button type="button" class="finish-state-toggle" id="finish-state-toggle"><span>Finish-state snapshot</span><span>+</span></button>`;
      html += `<div class="finish-state-body" id="finish-state-body">Click to load...</div>`;
      html += '</div>';
      html += '</div>';
    }

    bar.innerHTML = html;

    // Wire up grader pill clicks to show reasoning
    const pills = bar.querySelectorAll('.grader-pill');
    const reasoningEl = document.getElementById('grader-reasoning');
    pills.forEach((pill) => {
      pill.addEventListener('click', () => {
        const idx = parseInt(pill.getAttribute('data-grader-idx'), 10);
        const key = gKeys[idx];
        const g = graders[key];
        if (!g || !g.reasoning) return;
        if (reasoningEl.classList.contains('visible') && reasoningEl.getAttribute('data-active') === key) {
          reasoningEl.classList.remove('visible');
          return;
        }
        reasoningEl.textContent = g.reasoning;
        reasoningEl.setAttribute('data-active', key);
        reasoningEl.classList.add('visible');
      });
    });

    // Wire up finish-state toggle
    const fsToggle = document.getElementById('finish-state-toggle');
    if (fsToggle) {
      let fsLoaded = false;
      fsToggle.addEventListener('click', () => {
        const panel = document.getElementById('finish-state-panel');
        const body = document.getElementById('finish-state-body');
        const isOpen = panel.classList.toggle('open');
        if (!isOpen) return;
        if (fsLoaded) return;
        fsLoaded = true;
        const url = `${basePath}/${finishPath}`;
        body.textContent = 'Loading...';
        fetch(url)
          .then((res) => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
          .then((data) => { body.textContent = JSON.stringify(data, null, 2); })
          .catch((err) => { body.textContent = `Failed to load: ${err.message}`; });
      });
    }

    // Wire up criterion checklist toggle
    const critToggle = document.getElementById('criterion-toggle');
    const critList = document.getElementById('criterion-list');
    if (critToggle && critList) {
      critToggle.addEventListener('click', () => {
        const isOpen = critToggle.classList.toggle('open');
        critList.classList.toggle('collapsed', !isOpen);
      });
    }
  }

  function renderCriterionDetail(c) {
    const detail = c.detail;
    if (detail && typeof detail === 'object' && (detail.actual_value !== undefined || detail.expected_value !== undefined)) {
      const expected = stringifyShort(detail.expected_value);
      const actual = stringifyShort(detail.actual_value);
      const key = detail.field || detail.key || detail.name || '';
      const summary = key ? `<strong style="color:#e6edf3;">${esc(String(key))}</strong>` : '';
      const body =
        '<div class="criterion-diff">' +
          '<span class="k">expected</span><span class="v">' + esc(expected) + '</span>' +
          '<span class="k">actual</span><span class="v">' + esc(actual) + '</span>' +
        '</div>';
      return { summary, body };
    }
    const text = typeof detail === 'string' ? detail : (detail == null ? '' : JSON.stringify(detail));
    return { summary: '', body: text ? `<div class="criterion-detail">${esc(text)}</div>` : '' };
  }

  function stringifyShort(v) {
    if (v === undefined) return '(undefined)';
    if (v === null) return 'null';
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v); } catch { return String(v); }
  }

  // ── Agent stream (right panel) ─────────────────────────────────
  function loadAgentStream(task) {
    const body = document.getElementById('stream-body');
    const countEl = document.getElementById('stream-count');
    body.innerHTML = '<div class="placeholder"><div class="ph-text" style="color: #6e7681;">Loading messages...</div></div>';
    countEl.textContent = '';

    const msgUrl = messagesUrl(task);

    fetch(msgUrl)
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.text();
      })
      .then((text) => {
        const lines = text.trim().split('\n').filter(Boolean);
        const events = [];
        lines.forEach((line) => {
          try { events.push(JSON.parse(line)); } catch(e) { /* skip malformed */ }
        });
        renderStream(events);
      })
      .catch(() => {
        body.innerHTML = '<div class="placeholder"><div class="ph-icon">&#128196;</div><div class="ph-text" style="color: #6e7681;">No agent messages available</div></div>';
      });
  }

  function renderStream(events) {
    const body = document.getElementById('stream-body');
    const countEl = document.getElementById('stream-count');
    body.innerHTML = '';

    // Process events into display cards, tracking which step each card belongs to.
    // A `screenshot: N` field on an event means "this card produced screenshot N";
    // subsequent cards then belong to step N+1 until the next screenshot.
    const cards = [];
    let textBuffer = '';
    let cardStep = 1;

    function flushText() {
      if (textBuffer.trim()) {
        cards.push({ type: 'reasoning', content: textBuffer.trim(), step: cardStep });
      }
      textBuffer = '';
    }

    events.forEach((evt) => {
      const eventType = evt.type || evt.event || '';
      const evtScreenshot = typeof evt.screenshot === 'number' ? evt.screenshot : undefined;

      if (eventType === 'user') {
        flushText();
        cards.push({ type: 'user-query', content: evt.content || '', step: cardStep });
      } else if (eventType === 'text-delta' || eventType === 'text_delta') {
        textBuffer += (evt.delta || evt.text || evt.content || '');
      } else if (eventType === 'tool-input-available' || eventType === 'tool_use') {
        flushText();
        cards.push({
          type: 'tool-call',
          name: evt.toolName || evt.name || evt.tool || 'unknown',
          args: evt.input || evt.args || evt.arguments || null,
          step: cardStep,
        });
      } else if (eventType === 'tool-output-available' || eventType === 'tool_result') {
        flushText();
        const step = evtScreenshot !== undefined ? evtScreenshot : cardStep;
        cards.push({
          type: 'tool-output',
          content: evt.output || evt.content || evt.result || '',
          step,
        });
        if (evtScreenshot !== undefined) cardStep = evtScreenshot + 1;
      } else if (eventType === 'tool-output-error' || eventType === 'tool-input-error' || eventType === 'error') {
        flushText();
        const step = evtScreenshot !== undefined ? evtScreenshot : cardStep;
        cards.push({
          type: 'tool-error',
          content: evt.error || evt.message || evt.content || 'Unknown error',
          step,
        });
        if (evtScreenshot !== undefined) cardStep = evtScreenshot + 1;
      } else if (eventType === 'content_block_start' && evt.content_block && evt.content_block.type === 'tool_use') {
        flushText();
        cards.push({
          type: 'tool-call',
          name: evt.content_block.name || 'unknown',
          args: null,
          step: cardStep,
        });
      }
    });

    flushText();

    countEl.textContent = `${cards.length} events`;

    if (cards.length === 0) {
      body.innerHTML = '<div class="placeholder"><div class="ph-text" style="color: #6e7681;">No displayable events</div></div>';
      return;
    }

    cards.forEach((card) => {
      const el = document.createElement('div');
      el.className = 'stream-card';
      el.setAttribute('data-step', String(card.step || 0));
      el.setAttribute('data-kind', card.type);

      if (card.type === 'user-query') {
        el.classList.add('reasoning');
        el.style.borderColor = 'rgba(88, 166, 255, 0.4)';
        el.innerHTML =
          '<div class="card-label"><span class="icon">\uD83D\uDCDD</span> <span style="color:#58a6ff;">Task</span></div>' +
          '<div class="card-body" style="font-family: inherit; color: #e6edf3; font-size: 13px;">' + esc(card.content) + '</div>';

      } else if (card.type === 'tool-call') {
        el.classList.add('tool-call');
        let argsStr = '';
        if (card.args) {
          try {
            argsStr = typeof card.args === 'string' ? card.args : JSON.stringify(card.args, null, 2);
          } catch(e) { argsStr = String(card.args); }
        }
        el.innerHTML =
          '<div class="card-label"><span class="icon">\uD83D\uDD27</span> <span class="tool-name">' + esc(card.name) + '</span></div>' +
          (argsStr ? `<div class="card-body">${esc(truncate(argsStr, 500))}</div>` : '');

      } else if (card.type === 'tool-output') {
        el.classList.add('tool-output');
        const outputStr = typeof card.content === 'string' ? card.content : JSON.stringify(card.content, null, 2);
        const truncated = truncate(outputStr, 500);
        const needsExpand = outputStr.length > 500;

        el.innerHTML =
          '<div class="card-label"><span class="icon">\uD83D\uDCE4</span> Output</div>' +
          '<div class="card-body' + (needsExpand ? ' expandable' : '') + '">' + esc(truncated) + '</div>' +
          (needsExpand ? '<div class="expand-hint">Click to expand</div>' : '');

        if (needsExpand) {
          const bodyEl = el.querySelector('.card-body');
          const hintEl = el.querySelector('.expand-hint');
          const fullOutput = outputStr;
          let isExpanded = false;

          const toggleExpand = () => {
            isExpanded = !isExpanded;
            if (isExpanded) {
              bodyEl.textContent = fullOutput;
              bodyEl.classList.add('expanded');
              hintEl.textContent = 'Click to collapse';
            } else {
              bodyEl.textContent = truncated;
              bodyEl.classList.remove('expanded');
              hintEl.textContent = 'Click to expand';
            }
          }
          bodyEl.addEventListener('click', toggleExpand);
          hintEl.addEventListener('click', toggleExpand);
        }

      } else if (card.type === 'tool-error') {
        el.classList.add('tool-error');
        const errStr = typeof card.content === 'string' ? card.content : JSON.stringify(card.content);
        el.innerHTML =
          '<div class="card-label"><span class="icon">\u26A0\uFE0F</span> Error</div>' +
          '<div class="card-body">' + esc(truncate(errStr, 500)) + '</div>';

      } else if (card.type === 'reasoning') {
        el.classList.add('reasoning');
        el.innerHTML =
          '<div class="card-label"><span class="icon">\uD83D\uDCAC</span> Reasoning</div>' +
          '<div class="card-body" style="font-family: inherit; color: #c9d1d9;">' + esc(card.content) + '</div>';
      }

      body.appendChild(el);
    });

    applyStreamFilters();
    syncStreamToStep(currentStep);

    // Auto-scroll to bottom
    body.scrollTop = body.scrollHeight;
  }

  function applyStreamFilters() {
    const body = document.getElementById('stream-body');
    if (!body) return;
    const search = (streamSearch || '').toLowerCase();
    const cards = body.querySelectorAll('.stream-card');
    cards.forEach((el) => {
      const kind = el.getAttribute('data-kind') || '';
      let match = true;
      if (streamFilter === 'tool') {
        match = (kind === 'tool-call' || kind === 'tool-output');
      } else if (streamFilter === 'error') {
        match = (kind === 'tool-error');
      } else if (streamFilter === 'reasoning') {
        match = (kind === 'reasoning' || kind === 'user-query');
      }
      if (match && search) {
        match = (el.textContent || '').toLowerCase().indexOf(search) !== -1;
      }
      el.style.display = match ? '' : 'none';
    });
  }

  function syncStreamToStep(step) {
    const body = document.getElementById('stream-body');
    if (!body) return;
    const cards = body.querySelectorAll('.stream-card');
    let firstActive = null;
    cards.forEach((el) => {
      const s = parseInt(el.getAttribute('data-step') || '0', 10);
      const isActive = s === step;
      el.classList.toggle('step-active', isActive);
      if (isActive && !firstActive) firstActive = el;
    });
    if (firstActive) firstActive.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Wire stream filter chips + search (idempotent — fine to call on every load)
  function wireStreamControls() {
    document.querySelectorAll('[data-stream-filter]').forEach((btn) => {
      btn.addEventListener('click', () => {
        streamFilter = btn.getAttribute('data-stream-filter');
        document.querySelectorAll('[data-stream-filter]').forEach((b) => {
          b.classList.toggle('active', b === btn);
        });
        applyStreamFilters();
      });
    });
    const searchInput = document.getElementById('stream-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        streamSearch = searchInput.value;
        applyStreamFilters();
      });
    }
  }
  wireStreamControls();

  // ── Load task metadata for rich grader details ──────────────────
  function loadTaskMetadata(task) {
    const metaUrl = metadataUrl(task);
    fetch(metaUrl)
      .then((res) => res.ok ? res.json() : null)
      .then((meta) => {
        if (!meta || !meta.grader_results) return;
        const perfGrader = meta.grader_results.performance_grader;
        if (perfGrader?.details?.axes) {
          renderAxesBreakdown(perfGrader.details.axes, perfGrader.details);
        }
      })
      .catch(() => { /* metadata not available */ });
  }

  function renderAxesBreakdown(axes, details) {
    const container = document.getElementById('axes-breakdown');
    if (!container) return;

    let html = '';

    // Composite score header
    const composite = details.compositeScore || 0;
    const threshold = details.passThreshold || 75;
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #30363d;">';
    html += '<span style="font-size:12px;color:#8b949e;">Composite Score</span>';
    html += `<span style="font-size:18px;font-weight:700;color:${composite >= threshold ? '#3fb950' : '#f85149'};">${composite.toFixed(1)}</span>`;
    html += `<span style="font-size:11px;color:#6e7681;">/ 100 (threshold: ${threshold})</span>`;
    if (details.costUsd) html += `<span style="font-size:11px;color:#6e7681;margin-left:auto;">Cost: $${details.costUsd.toFixed(2)}</span>`;
    if (details.numTurns) html += `<span style="font-size:11px;color:#6e7681;">${details.numTurns} turns</span>`;
    html += '</div>';

    // Per-axis bars
    const axisKeys = Object.keys(axes);
    axisKeys.forEach((key, idx) => {
      const axis = axes[key];
      const score = axis.score || 0;
      const color = score >= 70 ? '#3fb950' : score >= 40 ? '#f0883e' : '#f85149';
      const name = esc(key.replace(/_/g, ' '));

      html += `<div class="axis-row" data-axis-idx="${idx}">`;
      html += `<span class="axis-name">${name}</span>`;
      html += `<div class="axis-bar-bg"><div class="axis-bar-fill" style="width:${score}%;background:${color};"></div></div>`;
      html += `<span class="axis-score" style="color:${color};">${score}</span>`;
      html += '</div>';
      html += `<div class="axis-reasoning" id="axis-reasoning-${idx}">${esc(axis.reasoning || '')}</div>`;
    });

    container.innerHTML = html;
    container.classList.add('visible');

    // Wire click handlers for axis reasoning toggle
    const rows = container.querySelectorAll('.axis-row');
    rows.forEach((row) => {
      row.addEventListener('click', () => {
        const idx = row.getAttribute('data-axis-idx');
        const reasoningEl = document.getElementById(`axis-reasoning-${idx}`);
        if (reasoningEl) reasoningEl.classList.toggle('visible');
      });
    });
  }

  // ── Keyboard navigation ────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        goToStep(currentStep - 1);
        break;
      case 'ArrowRight':
        e.preventDefault();
        goToStep(currentStep + 1);
        break;
      case 'ArrowUp':
        e.preventDefault();
        navigateTask(-1);
        break;
      case 'ArrowDown':
        e.preventDefault();
        navigateTask(1);
        break;
      case ' ':
        e.preventDefault();
        toggleAutoplay();
        break;
    }
  });

  function navigateTask(dir) {
    if (!manifest || !manifest.tasks) return;
    const tasks = manifest.tasks;
    if (!selectedTask) {
      if (tasks.length > 0) selectTask(tasks[0]);
      return;
    }
    const idx = tasks.findIndex((t) => t.queryId === selectedTask.queryId);
    const next = idx + dir;
    if (next >= 0 && next < tasks.length) selectTask(tasks[next]);
  }

  // ── Filter input ───────────────────────────────────────────────
  document.getElementById('filter-input').addEventListener('input', (e) => {
    renderTaskList(e.target.value);
  });

  // ── Utility functions ──────────────────────────────────────────
  function computeStats(tasks) {
    const total = tasks.length;
    let passed = 0, failed = 0, totalScore = 0, scoredCount = 0;
    let totalDurationMs = 0, durationCount = 0;
    let totalSteps = 0, stepsCount = 0;
    let totalToolCalls = 0, toolCount = 0;
    let totalToolErrors = 0;

    tasks.forEach((t) => {
      const metrics = taskMetrics(t);
      if (metrics.durationMs > 0) {
        totalDurationMs += metrics.durationMs;
        durationCount++;
      }
      if (metrics.steps > 0) {
        totalSteps += metrics.steps;
        stepsCount++;
      }
      totalToolCalls += metrics.toolCalls;
      totalToolErrors += metrics.toolErrors;
      toolCount++;

      const graders = t.graderResults || {};
      const keys = Object.keys(graders);
      if (keys.length > 0) {
        const anyPass = keys.some((k) => graders[k].pass);
        if (anyPass) passed++; else failed++;
        keys.forEach((k) => {
          if (typeof graders[k].score === 'number') {
            totalScore += graders[k].score;
            scoredCount++;
          }
        });
      }
    });

    return {
      total: total,
      passed: passed,
      failed: failed,
      avgScore: scoredCount > 0 ? Math.round((totalScore / scoredCount) * 100) : null,
      avgDurationMs: durationCount > 0 ? totalDurationMs / durationCount : null,
      avgSteps: stepsCount > 0 ? totalSteps / stepsCount : null,
      avgToolCalls: toolCount > 0 ? totalToolCalls / toolCount : null,
      totalToolCalls: totalToolCalls,
      totalToolErrors: totalToolErrors
    };
  }

  function taskMetrics(task) {
    const metrics = task.metrics || {};
    const screenshots = Number.isFinite(Number(metrics.screenshots))
      ? Number(metrics.screenshots)
      : Number(task.screenshotCount || 0);
    return {
      durationMs: Number.isFinite(Number(metrics.durationMs))
        ? Number(metrics.durationMs)
        : Number(task.durationMs || 0),
      steps: Number.isFinite(Number(metrics.steps))
        ? Number(metrics.steps)
        : screenshots,
      screenshots: screenshots,
      toolCalls: Number.isFinite(Number(metrics.toolCalls))
        ? Number(metrics.toolCalls)
        : 0,
      toolErrors: Number.isFinite(Number(metrics.toolErrors))
        ? Number(metrics.toolErrors)
        : 0
    };
  }

  function resolveStatus(task) {
    if (task.status === 'timeout') return 'timeout';
    const graders = task.graderResults || {};
    const keys = Object.keys(graders);
    if (keys.length === 0) return task.status || 'pending';
    const anyPass = keys.some((k) => graders[k].pass);
    return anyPass ? 'pass' : 'fail';
  }

  function resolveGrade(task) {
    const graders = task.graderResults || {};
    const keys = Object.keys(graders);
    if (keys.length === 0) return { label: '', cls: '' };
    const firstKey = keys[0];
    const score = graders[firstKey].score;
    if (typeof score === 'number') {
      const pct = Math.round(score * 100);
      return { label: `${pct}%`, cls: pct >= 75 ? 'pass' : 'fail' };
    }
    const anyPass = keys.some((k) => graders[k].pass);
    return { label: anyPass ? 'PASS' : 'FAIL', cls: anyPass ? 'pass' : 'fail' };
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str)));
    return d.innerHTML;
  }

  function escAttr(str) {
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function truncate(str, max) {
    str = String(str);
    if (str.length <= max) return str;
    return `${str.substring(0, max)}\u2026`;
  }

  function fmtDuration(ms) {
    if (ms < 1000) return `${ms}ms`;
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    const rem = s % 60;
    if (m < 60) return `${m}m ${rem}s`;
    const h = Math.floor(m / 60);
    const remM = m % 60;
    return `${h}h ${remM}m`;
  }

  function fmtCompact(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return '0';
    if (Number.isInteger(num)) return String(num);
    return num.toFixed(1);
  }

  function showFatalError(msgHtml) {
    document.getElementById('center-panel').innerHTML =
      '<div class="placeholder error">' +
        '<div class="ph-icon">&#9888;</div>' +
        '<div class="ph-text">' + msgHtml + '</div>' +
      '</div>';
    // Hide sidebar and right panel on fatal error
    document.getElementById('sidebar').style.display = 'none';
  }
})();
</script>
