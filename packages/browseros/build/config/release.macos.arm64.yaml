# Bharat Browser macOS Release Build Configuration (arm64 only)
#
# Single-architecture arm64 release build. Skips the universal_build
# pipeline (no x64, no lipo merge) — follows the standard per-arch flow
# like release.windows.yaml / release.linux.yaml.
#
# Environment Variables:
#   Use !env tag to reference environment variables:
#     Example: chromium_src: !env CHROMIUM_SRC

build:
  type: release
  architecture: arm64

gn_flags:
  file: build/config/gn/flags.macos.release.gn

# Explicit module execution order
modules:
  # Phase 1: Setup
  - clean
  - git_setup
  - sparkle_setup

  # Phase 2: Patches & Resources
  - download_resources
  - resources
  - bundled_extensions
  - chromium_replace
  - string_replaces
  - series_patches
  - patches

  # Phase 3: Build
  - configure
  - compile

  # Phase 4: Sign & Package
  - sign_macos
  - package_macos

  # Phase 5: Upload
  - upload

# Optional environment variables (for code signing):
#   MACOS_CERTIFICATE_NAME, PROD_MACOS_NOTARIZATION_APPLE_ID,
#   PROD_MACOS_NOTARIZATION_TEAM_ID, PROD_MACOS_NOTARIZATION_PWD
# Signing modules skip gracefully when not configured.

# Notification settings
notifications:
  slack: true
